<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Remote Call Center Connections</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #c81e1e;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 100px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2.5rem;
    }

    p {
      margin-bottom: 25px;
      color: #ffe3e3;
    }

    .contact-box {
      background: white;
      color: #222;
      padding: 40px;
      border-radius: 12px;
    }

    .email {
      display: inline-block;
      margin-top: 20px;
      background: #c81e1e;
      color: white;
      padding: 14px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Contact Us</h1>
    <p>
      Reach out to start working with us or to learn more about opportunities.
    </p>

    <div class="contact-box">
      <h2>Email</h2>
      <a href="mailto:youremail@example.com" class="email">
        youremail@example.com
      </a>
    </div>

    <a href="index.html" class="back">← Back to Home</a>
  </div>

</body>
</html>
